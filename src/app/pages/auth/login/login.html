<div class="surface-ground flex align-items-center justify-content-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-column align-items-center justify-content-center">
        <div
            style="border-radius:56px; padding:0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%);">
            <div class="w-full surface-card py-8 px-5 sm:px-8" style="border-radius:53px">
                <div class="text-center mb-5">
                    <img src="assets/logo-tpc.png" alt="Logo" class="mb-3 w-6rem shrink-0" />
                    <div class="text-900 text-3xl font-medium mb-3">Chào mừng!</div>
                    <span class="text-600 font-medium">Đăng nhập để tiếp tục</span>
                </div>

                <div>
                    <div *ngIf="errorMessage"
                        class="p-3 mb-5 border-round surface-ground text-red-500 text-center font-bold">
                        {{ errorMessage }}
                    </div>

                    <label for="email1" class="block text-900 text-xl font-medium mb-2">Email</label>
                    <input id="email1" type="text" placeholder="Địa chỉ email" pInputText class="w-full md:w-30rem mb-5"
                        style="padding:1rem" [(ngModel)]="email" />

                    <label for="password" class="block text-900 font-medium text-xl mb-2">Mật khẩu</label>
                    <p-password id="password" [(ngModel)]="password" placeholder="Password" [toggleMask]="true"
                        [feedback]="false" styleClass="mb-5" inputStyleClass="w-full p-3 md:w-30rem"></p-password>

                    <div class="flex align-items-center justify-content-between mb-5 gap-5">
                        <div class="flex align-items-center">
                            <p-checkbox id="rememberme1" [binary]="true" [(ngModel)]="rememberMe"
                                class="mr-2"></p-checkbox>
                            <label for="rememberme1">Ghi nhớ</label>
                        </div>
                        <a routerLink="/forgot-password" class="font-medium no-underline ml-2 text-right cursor-pointer"
                            style="color: var(--primary-color)">Quên mật khẩu?</a>
                    </div>
                    <button pButton pRipple label="Đăng nhập" class="w-full p-3 text-xl" (click)="onLogin()"></button>
                </div>
            </div>
        </div>
    </div>
</div>
