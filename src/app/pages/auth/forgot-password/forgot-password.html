<div class="surface-ground flex align-items-center justify-content-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-column align-items-center justify-content-center">
        <div style="border-radius:56px; padding:0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%);">
            <div class="w-full surface-card py-8 px-5 sm:px-8" style="border-radius:53px">
                <div class="text-center mb-5">
                    <img src="assets/logo-tpc.png" alt="Logo" class="mb-3 w-6rem shrink-0" />
                    <div class="text-900 text-3xl font-medium mb-3">Forgot Password</div>
                    <span class="text-600 font-medium">Nhập email của bạn để nhận mật khẩu mới</span>
                </div>

                <div>
                    <div *ngIf="message" class="p-3 mb-5 border-round surface-ground text-center font-bold" 
                         [ngClass]="isSent ? 'text-green-500' : 'text-red-500'">
                        {{ message }}
                    </div>

                    <label for="email1" class="block text-900 text-xl font-medium mb-2">Email</label>
                    <input id="email1" type="text" placeholder="Nhập địa chỉ email" pInputText class="w-full md:w-30rem mb-5"
                        style="padding:1rem" [(ngModel)]="email" [disabled]="isSent" />

                    <div class="flex align-items-center justify-content-between mb-5">
                        <a routerLink="/login" class="font-medium no-underline cursor-pointer flex align-items-center" style="color: var(--primary-color)">
                            <i class="pi pi-arrow-left mr-2"></i> Quay lại Đăng nhập
                        </a>
                    </div>
                    
                    <button pButton pRipple label="Gửi mật khẩu mới" class="w-full p-3 text-xl" 
                            (click)="onSubmit()" [disabled]="isSent"></button>
                </div>
            </div>
        </div>
    </div>
</div>
