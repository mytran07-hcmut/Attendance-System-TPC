<div class="grid">
    <!-- Metrics Cards -->
    <div class="col-12 lg:col-4">
        <div class="card mb-0 shadow-2 border-round">
            <div class="flex justify-content-between mb-3">
                <div>
                    <span class="block text-500 font-medium mb-3">Tổng giờ làm tháng này</span>
                    <div class="text-900 font-bold text-xl">{{ metrics.totalWorkHours }} giờ</div>
                </div>
                <div class="flex align-items-center justify-content-center bg-blue-100 border-round" style="width:2.5rem;height:2.5rem">
                    <i class="pi pi-clock text-blue-500 text-xl"></i>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-12 lg:col-4">
        <div class="card mb-0 shadow-2 border-round">
            <div class="flex justify-content-between mb-3">
                <div>
                    <span class="block text-500 font-medium mb-3">Số phép năm còn lại</span>
                    <div class="text-900 font-bold text-xl">{{ metrics.remainingLeaveDays }} ngày</div>
                </div>
                <div class="flex align-items-center justify-content-center bg-green-100 border-round" style="width:2.5rem;height:2.5rem">
                    <i class="pi pi-calendar-plus text-green-500 text-xl"></i>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-12 lg:col-4">
        <div class="card mb-0 shadow-2 border-round">
            <div class="flex justify-content-between mb-3">
                <div>
                    <span class="block text-500 font-medium mb-3">Số phép năm đã dùng</span>
                    <div class="text-900 font-bold text-xl">{{ metrics.usedLeaveDays }} ngày</div>
                </div>
                <div class="flex align-items-center justify-content-center bg-orange-100 border-round" style="width:2.5rem;height:2.5rem">
                    <i class="pi pi-calendar-minus text-orange-500 text-xl"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Leave History Table -->
    <div class="col-12 mt-4">
        <div class="card shadow-2 border-round">
            <div class="flex justify-content-between align-items-center mb-4">
                <h5 class="m-0"><i class="pi pi-history mr-2 text-primary"></i>Lịch sử đơn từ gần đây</h5>
                <button pButton pRipple label="Tạo đơn mới" icon="pi pi-plus" class="p-button-primary p-button-sm" routerLink="/employee/leave"></button>
            </div>
            
            <p-table [value]="leaveHistory" [rows]="5" responsiveLayout="scroll">
                <ng-template pTemplate="header">
                    <tr>
                        <th>Loại phép</th>
                        <th>Từ ngày</th>
                        <th>Đến ngày</th>
                        <th>Lý do</th>
                        <th>Trạng thái</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-req>
                    <tr>
                        <td class="font-medium">{{req.type}}</td>
                        <td>{{req.from}}</td>
                        <td>{{req.to}}</td>
                        <td>{{req.reason}}</td>
                        <td>
                            <p-tag [value]="req.status" [severity]="getSeverity(req.status)"></p-tag>
                        </td>
                    </tr>
                </ng-template>
            </p-table>

            <div class="flex justify-content-center mt-4">
                <button pButton pRipple label="Xem tất cả" icon="pi pi-angle-down" class="p-button-text p-button-secondary"></button>
            </div>
        </div>
    </div>
</div>
