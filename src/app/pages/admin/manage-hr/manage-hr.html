<p-toast></p-toast>
<div class="grid">
    <div class="col-12">
        <div class="card">
            <h5>Quản lý tài khoản HR</h5>
            <p-table #dt [value]="hrUsers" [rows]="10" [paginator]="true" responsiveLayout="scroll" [globalFilterFields]="['name','email']">
                <ng-template pTemplate="caption">
                    <div class="flex justify-content-between align-items-center">
                        <span class="font-medium text-lg">Danh sách HR</span>
                        <p-iconfield iconPosition="left">
                            <p-inputicon styleClass="pi pi-search"></p-inputicon>
                            <input pInputText #searchInput type="text" (input)="dt.filterGlobal(searchInput.value, 'contains')" placeholder="Tìm kiếm tên, email..." />
                        </p-iconfield>
                    </div>
                </ng-template>
                <ng-template pTemplate="header">
                    <tr>
                        <th>Tên HR</th>
                        <th>Email</th>
                        <th>Trạng thái</th>
                        <th>Quyền hạn</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-hr>
                    <tr class="hover:surface-100 transition-duration-150 cursor-pointer" (click)="editPermissions(hr)">
                        <td class="font-semibold">{{ hr.name }}</td>
                        <td>{{ hr.email }}</td>
                        <td>
                            <p-tag [severity]="hr.status === 'Hoạt động' ? 'success' : 'danger'" [value]="hr.status"></p-tag>
                        </td>
                        <td>
                            <div class="flex flex-wrap gap-1">
                                <span *ngIf="hr.permissions.length === 0" class="text-500">Chưa cấp quyền</span>
                                <p-tag *ngFor="let p of hr.permissions" [value]="p" styleClass="bg-blue-100 text-blue-800"></p-tag>
                            </div>
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="4" class="text-center p-4">
                            <div class="flex flex-column align-items-center">
                                <i class="pi pi-inbox text-500 text-4xl mb-3"></i>
                                <span class="text-600 text-lg">Không tìm thấy tài khoản HR nào.</span>
                            </div>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>

<p-dialog header="Phân quyền HR" [(visible)]="displayEditDialog" [modal]="true" [style]="{width: '400px'}" [draggable]="false" [resizable]="false">
    <div *ngIf="selectedHr" class="flex flex-column gap-4 py-3">
        <div class="flex align-items-center gap-3 border-bottom-1 surface-border pb-3">
            <div class="flex align-items-center justify-content-center bg-blue-100 border-circle" style="width: 3rem; height: 3rem">
                <i class="pi pi-user text-blue-500 text-2xl"></i>
            </div>
            <div>
                <div class="text-900 font-medium text-lg">{{ selectedHr.name }}</div>
                <div class="text-500">{{ selectedHr.email }}</div>
            </div>
        </div>

        <div class="flex flex-column gap-3">
            <div class="flex align-items-center justify-content-between">
                <label class="font-medium text-700">Tạo lịch làm việc</label>
                <p-toggleswitch [(ngModel)]="permissions.manageSchedule"></p-toggleswitch>
            </div>
            <div class="flex align-items-center justify-content-between">
                <label class="font-medium text-700">Duyệt lịch & Yêu cầu</label>
                <p-toggleswitch [(ngModel)]="permissions.approveSchedule"></p-toggleswitch>
            </div>
            <div class="flex align-items-center justify-content-between">
                <label class="font-medium text-700">Quản lý nghỉ phép</label>
                <p-toggleswitch [(ngModel)]="permissions.manageLeave"></p-toggleswitch>
            </div>
            <div class="flex align-items-center justify-content-between">
                <label class="font-medium text-700">Xem báo cáo</label>
                <p-toggleswitch [(ngModel)]="permissions.viewReports"></p-toggleswitch>
            </div>
        </div>
    </div>
    <ng-template pTemplate="footer">
        <button pButton pRipple label="Hủy" icon="pi pi-times" class="p-button-text" (click)="displayEditDialog = false"></button>
        <button pButton pRipple label="Lưu quyền" icon="pi pi-check" class="p-button-primary border-round-xl" (click)="savePermissions()"></button>
    </ng-template>
</p-dialog>
