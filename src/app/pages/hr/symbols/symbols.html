<div class="card">
    <div class="flex justify-content-between align-items-center mb-5">
        <h5>Quản lý bộ ký hiệu công</h5>
        <div>
            <button pButton pRipple label="Thêm ký hiệu" icon="pi pi-plus" class="p-button-primary mr-2" (click)="showDialogToAdd()"></button>
            <button pButton pRipple label="Khôi phục mặc định" icon="pi pi-refresh" class="p-button-secondary" (click)="resetDefault()"></button>
        </div>
    </div>

    <p-table [value]="symbols" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Ký hiệu (Code)</th>
                <th>Ý nghĩa (Name)</th>
                <th class="text-center">Màu sắc (Color)</th>
                <th class="text-center">Thao tác</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-symbol>
            <tr [pTooltip]="symbol.description" tooltipPosition="top">
                <td class="font-bold">{{symbol.code}}</td>
                <td>{{symbol.name}}</td>
                <td class="text-center">
                    <p-tag [value]="symbol.code" [style]="{'background-color': symbol.color, 'color': '#333'}" styleClass="border-1 border-400"></p-tag>
                </td>
                <td class="text-center">
                    <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-info p-button-text mr-2" (click)="showDialogToEdit(symbol)"></button>
                    <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-danger p-button-text" (click)="delete(symbol)"></button>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog header="{{isEdit ? 'Sửa ký hiệu' : 'Thêm ký hiệu'}}" [(visible)]="displayDialog" [modal]="true" showEffect="fade" [style]="{width: '400px'}" [breakpoints]="{'960px': '75vw'}">
    <div class="p-fluid">
        <div class="field grid align-items-center mb-3">
            <label for="code" class="col-12 sm:col-4 mb-0">Ký hiệu (vd: HC)</label>
            <div class="col-12 sm:col-8">
                <input pInputText id="code" [(ngModel)]="symbol.code" [disabled]="isEdit" class="w-full" />
            </div>
        </div>
        <div class="field grid align-items-center mb-3">
            <label for="name" class="col-12 sm:col-4 mb-0">Ý nghĩa</label>
            <div class="col-12 sm:col-8">
                <input pInputText id="name" [(ngModel)]="symbol.name" class="w-full" />
            </div>
        </div>
        <div class="field grid align-items-center mb-3">
            <label for="color" class="col-12 sm:col-4 mb-0">Màu hiển thị</label>
            <div class="col-12 sm:col-8">
                <p-colorPicker [(ngModel)]="symbol.color"></p-colorPicker>
            </div>
        </div>
        <div class="field mt-3">
            <label for="description" class="block mb-2">Giải thích ý nghĩa (dành cho HR)</label>
            <textarea pInputTextarea id="description" [(ngModel)]="symbol.description" rows="3" class="w-full"></textarea>
        </div>
    </div>
    <ng-template pTemplate="footer">
        <button pButton pRipple label="Hủy" icon="pi pi-times" class="p-button-text p-button-danger" (click)="displayDialog=false"></button>
        <button pButton pRipple label="Lưu" icon="pi pi-check" class="p-button-text p-button-success" (click)="save()"></button>
    </ng-template>
</p-dialog>
