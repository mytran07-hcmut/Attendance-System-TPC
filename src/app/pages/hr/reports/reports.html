<div class="card">
    <h5>Chốt công & Xuất báo cáo (Tháng hiện tại)</h5>
    <p-toolbar styleClass="mb-4 gap-2">
        <ng-template pTemplate="left">
            <button pButton pRipple label="Khóa sổ tháng" icon="pi pi-lock" class="p-button-danger mr-2"></button>
        </ng-template>
        <ng-template pTemplate="right">
            <button pButton pRipple label="Xuất Excel" icon="pi pi-file-excel" class="p-button-success" (click)="exportExcel()"></button>
        </ng-template>
    </p-toolbar>

    <p-table [value]="reports" [rows]="10" [paginator]="true" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Nhân viên</th>
                <th>Phòng ban</th>
                <th>Tổng Hành chính (HC)</th>
                <th>Tổng Nghỉ (OFF)</th>
                <th>Tổng Phép (L)</th>
                <th>Trạng thái dữ liệu</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-report>
            <tr>
                <td class="font-bold">{{report.employee}}</td>
                <td>{{report.department}}</td>
                <td>{{report.totalHC}}</td>
                <td>{{report.totalOFF}}</td>
                <td>{{report.totalL}}</td>
                <td>
                    <p-tag [severity]="report.status === 'Đủ công' ? 'success' : 'danger'" [value]="report.status"></p-tag>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
